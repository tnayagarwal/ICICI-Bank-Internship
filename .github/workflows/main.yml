name: DEAI MLOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest fastapi uvicorn
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Run PyTest API & LLM validation
      run: |
        pytest tests/
        
    - name: Build Global Docker Image
      run: |
        docker build -t icici-agentic-chatbot:latest .
